# ─────────────────────────────────────────────────────
# FASTER APP — Nginx Configuration
# Handles:
#   - HTTP → HTTPS redirect
#   - SSL termination (Let's Encrypt)
#   - Flutter web app (static files)
#   - Spring Boot API reverse proxy
#   - WebSocket (STOMP) proxy
#   - Uploaded images serving
#   - Security headers
# ─────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/xml+rss
               text/javascript;

    # ── Upload size ────────────────────────────────
    # Must match Spring Boot multipart config (10MB)
    client_max_body_size 10M;

    # ── Rate limiting ──────────────────────────────
    # Protect auth endpoints from brute force
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── HTTP → HTTPS redirect ─────────────────────
    server {
        listen 80;
        server_name faster-app.org www.faster-app.org;

        # Let's Encrypt challenge (for SSL cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name faster-app.org www.faster-app.org;

        # ── SSL Certificates (Let's Encrypt) ───────
        ssl_certificate     /etc/letsencrypt/live/faster-app.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/faster-app.org/privkey.pem;

        # ── SSL Hardening ───────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ────────────────────────
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # ── Flutter Web App (static files) ──────────
        root /usr/share/nginx/html;
        index index.html;

        # Flutter uses client-side routing — all unknown
        # paths must return index.html so Flutter Router works
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Spring Boot API ──────────────────────────
        # All /api/** requests → backend container
        location /api/ {
            # Rate limit API calls
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Auth endpoints — stricter rate limit ─────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Public tracking page ─────────────────────
        location /tracking/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (STOMP over SockJS) ────────────
        # Critical: proxy_http_version 1.1 + Upgrade headers
        # Without these, WebSocket handshake fails with 400
        location /ws/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections stay open — increase timeout
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Uploaded images (served by nginx directly) ─
        # Faster than going through Spring Boot for static files
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public";

            # Only allow image types
            location ~* \.(jpg|jpeg|png|gif|webp)$ {
                expires 7d;
            }
        }
    }
}