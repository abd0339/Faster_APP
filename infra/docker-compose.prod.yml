# ─────────────────────────────────────────────────────
# FASTER APP — Production Docker Compose
# Runs on your VPS: backend + postgres + redis + nginx
#
# Usage:
#   cd /opt/faster-app/infra
#   docker compose -f docker-compose.prod.yml --env-file ../.env up -d --build
#
# All secrets come from .env — never hardcoded here
# ─────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: faster_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faster_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - faster_internal
    # NOT exposed to host — only backend can reach it
    # via the internal Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d faster_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: faster_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - faster_internal
    # NOT exposed to host — internal only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: faster_backend
    restart: unless-stopped
    environment:
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/faster_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Upload paths inside container
      APP_UPLOAD_DIR: /app/uploads
      # CORS — your actual domain
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Vonage — WhatsApp (JWT) + SMS (api_key/secret)
      VONAGE_APPLICATION_ID: ${VONAGE_APPLICATION_ID}
      VONAGE_PRIVATE_KEY_PATH: /app/secrets/vonage-private.key
      VONAGE_WHATSAPP_FROM: ${VONAGE_WHATSAPP_FROM}
      VONAGE_API_KEY: ${VONAGE_API_KEY}
      VONAGE_API_SECRET: ${VONAGE_API_SECRET}
      VONAGE_SMS_SENDER: ${VONAGE_SMS_SENDER}
      VONAGE_DEFAULT_CHANNEL: ${VONAGE_DEFAULT_CHANNEL}
    volumes:
      # Persist user-uploaded PUBLIC images outside the container
      - uploads_data:/app/uploads
      # PRIVATE documents (driver license, national ID, profile
      # photo). Deliberately mounted ONLY on backend — nginx
      # below has no volume, no location block, and no route
      # for this path at all. That omission is what makes these
      # files physically unreachable from the internet; only
      # the authenticated Spring endpoints in DriverController /
      # AdminController can read them.
      - private_uploads_data:/app/private-uploads
      # Vonage private key — a single file, mounted READ-ONLY
      # from the host. Lives at /opt/faster-app/vonage-private.key
      # on the server, OUTSIDE git, OUTSIDE the Docker image.
      # Same treatment as .env: server-only secret, never committed.
      - ../vonage-private.key:/app/secrets/vonage-private.key:ro
    networks:
      - faster_internal
    # NOT exposed to host — nginx proxies to it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Nginx (Reverse Proxy + SSL + Flutter Web) ───────
  nginx:
    image: nginx:alpine
    container_name: faster_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx config
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates from Let's Encrypt
      - ../certbot_data:/etc/letsencrypt:ro
      - ../certbot_www:/var/www/certbot:ro
      # Flutter web build output
      - ../frontend/build/web:/usr/share/nginx/html:ro
      # Uploaded images (served directly by nginx) — PUBLIC only.
      # private_uploads_data is intentionally NOT mounted here.
      - uploads_data:/app/uploads:ro
    networks:
      - faster_internal
    depends_on:
      backend:
        condition: service_healthy

# ── Networks ────────────────────────────────────────
networks:
  faster_internal:
    driver: bridge
    # Internal network — postgres and redis
    # are invisible to the outside world

# ── Volumes ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  private_uploads_data:
    driver: local