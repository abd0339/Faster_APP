version: '3.8'

services:
  # The Vault (Permanent Database)
  postgres:
    image: postgres:15
    container_name: super_app_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: logistics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The Fast-Track (Live Cache)
  redis:
    image: redis:alpine
    container_name: super_app_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: