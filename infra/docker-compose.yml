version: '3.8'

services:

  # ─── PostgreSQL Database ───────────────────────────
  postgres:
    image: postgres:16
    container_name: faster_postgres
    restart: always
    environment:
      POSTGRES_DB: faster_db
      POSTGRES_USER: faster_user
      POSTGRES_PASSWORD: ***REMOVED***
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─── Redis (Live GPS Storage) ──────────────────────
  redis:
    image: redis:alpine
    container_name: faster_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: