# ─────────────────────────────────────────────────────
# FASTER APP — GitHub Actions CI/CD Pipeline
# Triggers on every push to main branch
#
# What it does:
#   1. Builds and tests the Spring Boot backend
#   2. Builds Flutter web for production
#   3. SSHes into your VPS and deploys everything
#
# Secrets to add in GitHub → Settings → Secrets:
#   VPS_HOST        → your server IP (e.g. 167.71.x.x)
#   VPS_USER        → ssh username (e.g. root or ubuntu)
#   VPS_SSH_KEY     → your private SSH key (cat ~/.ssh/id_rsa)
#   BACKEND_URL     → https://your-domain.com
#   GOOGLE_PLACES_KEY → your Google Places API key
#   ADMIN_WHATSAPP  → your WhatsApp number
# ─────────────────────────────────────────────────────

name: Faster App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Test Backend ───────────────────────────
  test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Run tests
        working-directory: backend
        run: mvn test -q
        # Tests are minimal now — this step
        # will expand as you write more tests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-0.0.1-SNAPSHOT.jar
          retention-days: 1

  # ── Job 2: Build Flutter Web ──────────────────────
  build-flutter:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: frontend
        run: |
          flutter build web \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }} \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_KEY }} \
            --dart-define=ADMIN_WHATSAPP=${{ secrets.ADMIN_WHATSAPP }} \
            --release
        # NOTE: dart-define injects values at compile time
        # The .env file is NOT used in production Flutter web
        # Values are baked into the JS bundle

      - name: Upload Flutter web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: frontend/build/web/
          retention-days: 1

  # ── Job 3: Deploy to VPS ──────────────────────────
  # Only runs on push to main (not on PRs)
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test-backend, build-flutter]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download Flutter web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: frontend/build/web/

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "── Pulling latest code ──"
            cd /opt/faster-app
            git pull origin main

            echo "── Restarting services ──"
            cd /opt/faster-app/infra
            docker compose -f docker-compose.prod.yml \
              --env-file /opt/faster-app/.env \
              up -d --build --remove-orphans

            echo "── Waiting for backend health ──"
            sleep 15
            docker exec faster_backend wget -qO- http://localhost:8080/api/health

            echo "── Cleanup old images ──"
            docker image prune -f

            echo "✅ Deploy complete"