# ─── APP ───────────────────────────────────────────
spring.application.name=faster-backend
server.port=8080

# ─── PostgreSQL DATABASE ────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5433/faster_db
spring.datasource.username=faster_user
spring.datasource.password=***REMOVED***
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / HIBERNATE ────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── REDIS ──────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ─── JWT ────────────────────────────────────────────
app.jwt.secret=***REMOVED***
app.jwt.expiration-ms=864000000

# ─── FILE UPLOAD ────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ─── REDIS CACHE ────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ─── JPA PERFORMANCE ────────────────────────────────
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false