# ─────────────────────────────────────────────────────
# FASTER APP — Production Properties
# Active when: SPRING_PROFILES_ACTIVE=prod
# ─────────────────────────────────────────────────────

spring.application.name=faster-backend
server.port=8080

# ── Database ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# FIX (was MEDIUM/HIGH): ddl-auto was "update" in prod, which lets Hibernate
# silently alter the live schema and can cause data loss on entity changes.
# First successful deploy has already created the tables, so this is now
# "validate": the app boots only if the schema matches the entities, and
# schema changes go through explicit SQL migrations (Flyway recommended).
# If you are deploying to a brand-new empty DB, set DDL_AUTO=update for the
# very first boot only, then remove it.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Redis ─────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:864000000}

# ── CORS ──────────────────────────────────────────────
# REQUIRED in prod. e.g. https://faster-app.org,https://www.faster-app.org
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://faster-app.org,https://www.faster-app.org}

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/app/uploads
app.private-upload.dir=/app/private-uploads

# ── Jackson ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ── Logging ───────────────────────────────────────────
logging.level.root=WARN
logging.level.com.faster=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ── Actuator / Health endpoint ────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

# ── Communication (WhatsApp / SMS via Vonage ONLY) ────
app.base.url=${APP_BASE_URL:https://faster-app.org}
vonage.default-channel=${VONAGE_DEFAULT_CHANNEL:WHATSAPP}
vonage.application-id=${VONAGE_APPLICATION_ID:}
vonage.private-key-path=${VONAGE_PRIVATE_KEY_PATH:/app/secrets/vonage-private.key}
vonage.whatsapp-from=${VONAGE_WHATSAPP_FROM:14157386102}
vonage.api-key=${VONAGE_API_KEY:}
vonage.api-secret=${VONAGE_API_SECRET:}
vonage.sms-sender=${VONAGE_SMS_SENDER:FasterApp}
# ─── PRICING (C2 fix — server-side pricing) ──────────
# Delivery fee (LOGISTICS): base + rate per km, floored at min
pricing.delivery.base-fee=1.00
pricing.delivery.rate-per-km=0.50
pricing.delivery.min-fee=1.50
# Ride fee (MOBILITY): same distance-based approach
pricing.ride.base-fee=1.50
pricing.ride.rate-per-km=0.60
pricing.ride.min-fee=2.00