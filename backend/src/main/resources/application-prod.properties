# ─────────────────────────────────────────────────────
# FASTER APP — Production Properties
# Active when: SPRING_PROFILES_ACTIVE=prod
# ─────────────────────────────────────────────────────

spring.application.name=faster-backend
server.port=8080

# ── Database ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# UPDATE on first deploy — creates all tables automatically
# Switch to VALIDATE after first successful start
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Redis ─────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=864000000

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/app/uploads

# ── Jackson ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ── Logging ───────────────────────────────────────────
logging.level.root=WARN
logging.level.com.faster=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ── Health endpoint ───────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Communication (SMS / WhatsApp) ────────────────────
sms.provider=${SMS_PROVIDER:twilio}
sms.sender.id=${SMS_SENDER_ID:FasterAPP}
app.base.url=${APP_BASE_URL:https://faster-app.org}
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
sms.vonage.api-key=${VONAGE_API_KEY:}
sms.vonage.api-secret=${VONAGE_API_SECRET:}

spring.security.user.name=disabled
spring.security.user.password=disabled