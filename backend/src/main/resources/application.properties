# ─── APP ────────────────────────────────────────────
spring.application.name=faster-backend
server.port=8080

# ─── PostgreSQL DATABASE ─────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/faster_db}
spring.datasource.username=${DB_USERNAME:faster_user}
spring.datasource.password=${DB_PASSWORD:faster_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / HIBERNATE ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── REDIS ───────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ─── JWT ─────────────────────────────────────────────
# FIX (C4): no committed secret and no fallback. JwtUtil.init() now
# throws at startup if this is missing/short, so there is nothing to
# "shadow" — you MUST export JWT_SECRET before running locally, e.g.:
#   export JWT_SECRET=$(openssl rand -base64 48)
#   mvn spring-boot:run
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:864000000}

# ─── CORS ────────────────────────────────────────────
# Local dev defaults; prod overrides via ALLOWED_ORIGINS env var
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://10.0.2.*,http://192.168.*.*}

# ─── FILE UPLOAD ─────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ─── REDIS CACHE ─────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ─── JPA PERFORMANCE ─────────────────────────────────
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ─── COMMUNICATION (SMS / WhatsApp) ──────────────────
sms.provider=${SMS_PROVIDER:twilio}
sms.sender.id=${SMS_SENDER_ID:FasterAPP}
app.base.url=${APP_BASE_URL:http://localhost:8080}

sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

sms.vonage.api-key=${VONAGE_API_KEY:}
sms.vonage.api-secret=${VONAGE_API_SECRET:}