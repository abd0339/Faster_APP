# ─────────────────────────────────────────────────────
# FASTER APP — Production Properties
# Active when: SPRING_PROFILES_ACTIVE=prod
# (set in Dockerfile ENTRYPOINT)
#
# All secrets come from environment variables
# injected by docker-compose.prod.yml from .env
# NEVER put real values in this file
# ─────────────────────────────────────────────────────

spring.application.name=faster-backend
server.port=8080

# ── Database ──────────────────────────────────────────
# In prod, postgres hostname = "postgres" (Docker service name)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP defaults are fine for launch)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# VALIDATE: checks schema matches entities on startup
# NEVER use "update" or "create" in production
# If schema doesn't match → app refuses to start (safe)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Redis ─────────────────────────────────────────────
# "redis" = Docker service name on the internal network
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ── Redis Cache ───────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=864000000

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# Absolute path inside the container (matches Docker volume)
app.upload.dir=/app/uploads

# ── Jackson ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ── Logging ───────────────────────────────────────────
# Only warnings and errors in production
logging.level.root=WARN
logging.level.com.faster=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ── Actuator (health endpoint) ────────────────────────
# Used by Docker healthcheck and nginx upstream check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never