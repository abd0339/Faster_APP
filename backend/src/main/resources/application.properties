# ─── APP ────────────────────────────────────────────
spring.application.name=faster-backend
server.port=8080

# ─── PostgreSQL DATABASE ─────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/faster_db}
spring.datasource.username=${DB_USERNAME:faster_user}
spring.datasource.password=${DB_PASSWORD:faster_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / HIBERNATE ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── REDIS ───────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ─── JWT ─────────────────────────────────────────────
# FIX (C4): no committed secret and no fallback. JwtUtil.init() now
# throws at startup if this is missing/short, so there is nothing to
# "shadow" — you MUST export JWT_SECRET before running locally, e.g.:
#   export JWT_SECRET=$(openssl rand -base64 48)
#   mvn spring-boot:run
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:864000000}

# ─── CORS ────────────────────────────────────────────
# Local dev defaults; prod overrides via ALLOWED_ORIGINS env var
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://10.0.2.*,http://192.168.*.*}

# ─── FILE UPLOAD ─────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.private-upload.dir=private-uploads

# ─── REDIS CACHE ─────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ─── JPA PERFORMANCE ─────────────────────────────────
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ─── COMMUNICATION (WhatsApp / SMS via Twilio ONLY) ──
# Vonage removed — account issues on their side made it
# unworkable. Twilio confirmed working with real delivered
# messages after enabling Geo Permissions for Lebanon.
app.base.url=${APP_BASE_URL:http://localhost:8080}
twilio.default-channel=${TWILIO_DEFAULT_CHANNEL:WHATSAPP}

twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
# Messaging Service — pools the Alphanumeric Sender
# ("FasterApp") + a real phone number; Twilio auto-selects
# whichever actually works per destination country
twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}
# WhatsApp sandbox number for now — switches to your
# approved WhatsApp Business number once Meta approval
# clears, just update this env var, no code change needed
# ─── PRICING (C2 fix — server-side pricing) ──────────
# Delivery fee (LOGISTICS): base + rate per km, floored at min
pricing.delivery.base-fee=1.00
pricing.delivery.rate-per-km=0.50
pricing.delivery.min-fee=1.50
# Ride fee (MOBILITY): same distance-based approach
pricing.ride.base-fee=1.50
pricing.ride.rate-per-km=0.60
pricing.ride.min-fee=2.00