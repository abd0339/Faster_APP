# ─── APP ────────────────────────────────────────────
spring.application.name=faster-backend
server.port=8080

# ─── PostgreSQL DATABASE ─────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/faster_db}
spring.datasource.username=${DB_USERNAME:faster_user}
spring.datasource.password=${DB_PASSWORD:faster_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / HIBERNATE ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── REDIS ───────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ─── JWT ─────────────────────────────────────────────
# FIX (C4): no committed secret and no fallback. JwtUtil.init() now
# throws at startup if this is missing/short, so there is nothing to
# "shadow" — you MUST export JWT_SECRET before running locally, e.g.:
#   export JWT_SECRET=$(openssl rand -base64 48)
#   mvn spring-boot:run
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:864000000}

# ─── CORS ────────────────────────────────────────────
# Local dev defaults; prod overrides via ALLOWED_ORIGINS env var
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://10.0.2.*,http://192.168.*.*}

# ─── FILE UPLOAD ─────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.private-upload.dir=private-uploads

# ─── REDIS CACHE ─────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ─── JPA PERFORMANCE ─────────────────────────────────
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ─── COMMUNICATION (WhatsApp / SMS via Vonage ONLY) ──
# Twilio removed — Vonage is the single provider now.
app.base.url=${APP_BASE_URL:http://localhost:8080}

# Which channel is used when a caller doesn't specify one
# explicitly — WHATSAPP (default) or SMS
vonage.default-channel=${VONAGE_DEFAULT_CHANNEL:WHATSAPP}

# ─── Vonage Messages API (WhatsApp) — JWT auth ───────
vonage.application-id=${VONAGE_APPLICATION_ID:}
# Path to the mounted private key file — see docker-compose.
# Local dev default assumes you've placed a copy at this path.
vonage.private-key-path=${VONAGE_PRIVATE_KEY_PATH:./vonage-private.key}
# Sandbox WhatsApp sender for now — switches to your approved
# WhatsApp Business number once Meta approval clears
vonage.whatsapp-from=${VONAGE_WHATSAPP_FROM:14157386102}

# ─── Vonage SMS API — api_key/api_secret auth ────────
vonage.api-key=${VONAGE_API_KEY:}
vonage.api-secret=${VONAGE_API_SECRET:}
# Alphanumeric Sender ID — required for Lebanon, since
# numeric sender IDs aren't reliably supported there
vonage.sms-sender=${VONAGE_SMS_SENDER:FasterApp}
# ─── PRICING (C2 fix — server-side pricing) ──────────
# Delivery fee (LOGISTICS): base + rate per km, floored at min
pricing.delivery.base-fee=1.00
pricing.delivery.rate-per-km=0.50
pricing.delivery.min-fee=1.50
# Ride fee (MOBILITY): same distance-based approach
pricing.ride.base-fee=1.50
pricing.ride.rate-per-km=0.60
pricing.ride.min-fee=2.00