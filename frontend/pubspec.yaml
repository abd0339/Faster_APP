name: faster_app
description: Faster - Logistics & Mobility Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_dotenv: ^5.2.1

  # ─── State Management ─────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ─── Networking ───────────────────────────────────
  dio: ^5.7.0
  stomp_dart_client: ^3.0.1

  # ─── Storage ──────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.2

  # ─── Maps ─────────────────────────────────────────
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # ─── Location ─────────────────────────────────────
  geolocator: ^10.1.1
  geocoding: ^2.2.2

  # ─── Animations ───────────────────────────────────
  rive: ^0.12.4
  lottie: ^3.0.0
  animate_do: ^3.3.4

  # ─── Images ───────────────────────────────────────
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # ─── UI Helpers ───────────────────────────────────
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  badges: ^3.1.2
  fl_chart: ^0.66.2
  intl: ^0.19.0

  # ─── Utilities ────────────────────────────────────
  url_launcher: ^6.2.1
  permission_handler: ^11.3.1
  connectivity_plus: ^5.0.2
  vibration: ^1.8.4
  battery_plus: ^4.0.2

  # ─── Icons ────────────────────────────────────────
  cupertino_icons: ^1.0.6
  flutter_vector_icons: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600