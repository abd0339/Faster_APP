name: faster_app
description: Faster - Logistics & Mobility Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ─────────────────────────────
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # ─── Networking ───────────────────────────────────
  dio: ^5.3.2
  stomp_dart_client: ^0.4.4

  # ─── Storage & Security ───────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # ─── Maps ─────────────────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # ─── Location ─────────────────────────────────────
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # ─── Animations ───────────────────────────────────
  rive: ^0.12.4
  lottie: ^3.0.0
  animate_do: ^3.3.4

  # ─── Images ───────────────────────────────────────
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # ─── UI Helpers ───────────────────────────────────
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  badges: ^3.1.2
  fl_chart: ^0.64.0

  # ─── Utilities ────────────────────────────────────
  intl: ^0.18.1
  url_launcher: ^6.2.1
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  vibration: ^1.8.4
  battery_plus: ^4.0.2

  # ─── Icons ────────────────────────────────────────
  cupertino_icons: ^1.0.2
  flutter_vector_icons: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600